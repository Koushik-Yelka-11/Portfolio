<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Me</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --yellow: #a19d9d;
      --black: #0f0f0f;
      --gray: #6b6b6b;
      --light-gray: #f0f0f0;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 40px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #e0e0e0 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.45;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1060px;
    }

    /* ===== NAVIGATION BAR ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 18px 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      z-index: 1000;
      display: flex;
      justify-content: center;
    }

    .nav-links {
      display: flex;
      gap: 40px;
    }

    .nav-links a {
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a1a2e;
      opacity: 0.6;
      transition: all 0.3s ease;
    }

    .nav-links a:hover {
      opacity: 1;
      color: #252525;
      transform: scale(1.1);
    }

    .nav-link.active {
      color: #1f1f1f;
      opacity: 1;
      text-shadow: 0 0 8px rgba(33, 33, 33, 0.4);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--yellow);
      color: var(--black);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 50px;
      margin-bottom: 22px;
      animation: fadeUp 0.5s ease both;
    }

    .tag-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--black);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 0;
      background: var(--white);
      border-radius: 28px;
      border: 1.5px solid #e8e8e8;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,0.07);
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .left-panel {
      padding: 56px 52px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 5.5vw, 5rem);
      font-weight: 800;
      color: var(--black);
      line-height: 1.0;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: italic;
      color: var(--yellow);
    }

    .subtitle {
      color: var(--gray);
      font-size: 0.92rem;
      line-height: 1.75;
      margin-bottom: 42px;
      max-width: 360px;
      font-weight: 300;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group {
      margin-bottom: 18px;
      position: relative;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--black);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input,
    textarea {
      width: 100%;
      background: var(--light-gray);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.93rem;
      color: var(--black);
      outline: none;
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      resize: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #bbb;
    }

    input:focus,
    textarea:focus {
      border-color: var(--yellow);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(144, 144, 144, 0.12);
    }

    /* Validation states */
    input.invalid,
    textarea.invalid {
      border-color: #e05252;
      background: #fff8f8;
    }

    input.valid,
    textarea.valid {
      border-color: #52b788;
    }

    textarea {
      height: 120px;
    }

    .submit-row {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--black);
      color: var(--white);
      border: 2px solid var(--black);
      border-radius: 50px;
      padding: 14px 34px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.22s ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--yellow);
      border-color: var(--yellow);
      color: var(--black);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(161, 157, 157, 0.35);
    }

    .btn .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .btn:hover .arrow {
      transform: translateX(4px);
    }

    /* Status message */
    #status {
      font-size: 0.82rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 50px;
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    #status.success {
      display: inline-block;
      background: #d8f3dc;
      color: #1b4332;
    }

    #status.error {
      display: inline-block;
      background: #ffe0e0;
      color: #7b1d1d;
    }

    .divider-text {
      font-family: 'Times New Roman', Times, serif;
      font-style: italic;
      font-size: 1.6rem;
      color: #000000;
      opacity: 0.8;
      margin: 10px 40px;
    }

    .social-links {
      display: flex;
      gap: 20px;
    }

    .social-links a {
      font-size: 1.9rem;
      color: #555;
      transition: all 0.3s ease;
    }

    .social-links a:hover {
      color: #000;
      transform: scale(1.2);
    }

    .right-panel {
      position: relative;
      background: var(--white);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      border-left: 1.5px solid #e8e8e8;
      min-height: 520px;
    }

    .blob {
      position: absolute;
      width: 420px;
      height: 490px;
      background: rgb(138, 138, 138);
      border-radius: 62% 38% 46% 54% / 60% 44% 56% 40%;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 0;
      animation: blobFloat 6s ease-in-out infinite;
    }

    @keyframes blobFloat {
      0%, 100% {
        border-radius: 62% 38% 46% 54% / 60% 44% 56% 40%;
        transform: translateX(-50%) translateY(0);
      }
      50% {
        border-radius: 44% 56% 60% 40% / 50% 60% 40% 52%;
        transform: translateX(-50%) translateY(-10px);
      }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #personCanvas {
      position: relative;
      z-index: 1;
      display: block;
      filter: drop-shadow(0 16px 36px rgba(0,0,0,0.18));
    }
    /* ===== RESPONSIVE ===== */

    /* Tablet */
    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .right-panel {
        display: none; /* hide image panel on smaller screens */
      }

      .left-panel {
        padding: 44px 40px;
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      body {
        padding: 76px 16px 32px;
        align-items: flex-start;
      }

      .navbar { padding: 14px 16px; }

      .nav-links { gap: 14px; flex-wrap: wrap; justify-content: center; }

      .nav-links a { font-size: 0.68rem; letter-spacing: 0.06em; }

      .page-wrapper { max-width: 100%; }

      .tag { font-size: 0.66rem; padding: 5px 14px; }

      .layout {
        border-radius: 20px;
      }

      .left-panel {
        padding: 32px 24px;
      }

      h1 {
        font-size: 2.6rem;
      }

      .subtitle {
        font-size: 0.86rem;
        margin-bottom: 28px;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .form-group {
        margin-bottom: 14px;
      }

      textarea {
        height: 100px;
      }

      .submit-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
        margin-top: 16px;
      }

      .btn {
        width: 100%;
        justify-content: center;
        padding: 13px 24px;
      }

      .divider-text { display: none; }

      .social-links { gap: 18px; }

      .social-links a { font-size: 1.6rem; }

      #status { width: 100%; text-align: center; }
    }
  </style>
</head>

<body>

  <header class="navbar">
    <nav class="nav-links">
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link active">Contact</a>
      <a href="skills.html" class="nav-link">Skills</a>
      <a href="project.html" class="nav-link">Project</a>
      <a href="assets/resume.pdf" class="nav-link">Resume</a>
    </nav>
  </header>

  <div class="page-wrapper">
    <div class="tag">
      <span class="tag-dot"></span>Let's connect
    </div>

    <div class="layout">
      <div class="left-panel">
        <h1>Get in <em>touch.</em></h1>

        <p class="subtitle">
          Feel free to connect and share your thoughts or just say hello.
          I'll get back to you as soon as possible.
        </p>

        <form id="contactForm" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label for="name">Your Name</label>
              <input type="text" id="name" name="name" placeholder="full name" required />
            </div>

            <div class="form-group">
              <label for="email">Your Mail</label>
              <input type="email" id="email" name="email" placeholder="your mail id" required />
            </div>
          </div>

          <div class="form-group full">
            <label for="message">Your Message</label>
            <textarea id="message" name="message" placeholder="Hey, I'd love to connect about…" required></textarea>
          </div>

          <div class="submit-row">
            <button type="submit" class="btn">
              Send Message <span class="arrow">→</span>
            </button>

            <span class="divider-text"></span>

            <div class="social-links">
              <a href="https://github.com/Koushik-Yelka-11" target="_blank">
                <i class="fab fa-github"></i>
              </a>
              <a href="https://www.linkedin.com/in/yelka-koushik-69919632b/" target="_blank">
                <i class="fab fa-linkedin"></i>
              </a>
              <a href="https://www.instagram.com/programmer11x/" target="_blank">
                <i class="fab fa-instagram"></i>
              </a>
              <a href="https://t.me/Koushik_Goud" target="_blank">
                <i class="fab fa-telegram"></i>
              </a>
            </div>

            <span id="status"></span>
          </div>

        </form>
      </div>

      <div class="right-panel">
        <div class="blob"></div>
        <canvas id="personCanvas"></canvas>
      </div>
    </div>
  </div>

  <script>
    /* ── Canvas image ── */
    const canvas = document.getElementById('personCanvas');
    const ctx    = canvas.getContext('2d');

    const img = new Image();
    img.onload = function () {
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      ctx.drawImage(img, 0, 0);
      canvas.style.width  = '580px';
      canvas.style.height = 'auto';
    };
    img.src = '/assets/koushik/koushik2.png';

    /* ── YOUR email address ── */
    const YOUR_EMAIL = 'yelkakoushik11@gmail.com'; // ← change to your address

    /* ── Helpers ── */
    function setFieldState(el, valid) {
      el.classList.toggle('valid',   valid);
      el.classList.toggle('invalid', !valid);
    }

    function showStatus(msg, type) {
      const s = document.getElementById('status');
      s.textContent = msg;
      s.className   = type;           // 'success' | 'error'
      s.style.display = 'inline-block';
      setTimeout(() => { s.style.display = 'none'; }, 5000);
    }

    /* ── Live validation ── */
    ['name', 'email', 'message'].forEach(id => {
      document.getElementById(id).addEventListener('blur', function () {
        const ok = this.value.trim() !== '' &&
                   (id !== 'email' || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value));
        setFieldState(this, ok);
      });
    });

    /* ── Form submit → mailto ── */
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const nameEl    = document.getElementById('name');
      const emailEl   = document.getElementById('email');
      const messageEl = document.getElementById('message');

      const name    = nameEl.value.trim();
      const email   = emailEl.value.trim();
      const message = messageEl.value.trim();

      /* Validate */
      let valid = true;

      if (!name) {
        setFieldState(nameEl, false);
        valid = false;
      } else {
        setFieldState(nameEl, true);
      }

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldState(emailEl, false);
        valid = false;
      } else {
        setFieldState(emailEl, true);
      }

      if (!message) {
        setFieldState(messageEl, false);
        valid = false;
      } else {
        setFieldState(messageEl, true);
      }

      if (!valid) {
        showStatus('Please fill in all fields correctly.', 'error');
        return;
      }

      /* Build mailto link */
      const subject = encodeURIComponent(`Portfolio Contact from ${name}`);
      const body    = encodeURIComponent(
        `Name: ${name}\nEmail: ${email}\n\n${message}`
      );

      const mailtoLink = `mailto:${YOUR_EMAIL}?subject=${subject}&body=${body}`;

      /* Open default mail client */
      window.location.href = mailtoLink;

      /* Feedback + reset */
      showStatus('Opening your mail client… ✓', 'success');
      this.reset();
      ['name', 'email', 'message'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('valid', 'invalid');
      });
    });
  </script>

</body>
</html>
