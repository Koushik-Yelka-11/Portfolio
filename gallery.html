<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .experience-section {
      max-width: 1100px;
      margin: 60px auto;
      padding: 20px;
    }

    .experience-section h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2rem;
    }

    .experience-gallery {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  flex-direction: row;
}

    .experience-item {
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .experience-item img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      display: block;
    }

    .experience-item p {
      padding: 1px;
      text-align: center;
      font-size: 0.95rem;
      color: #333;
    }
  </style>
</head>

<body>

  <section class="experience-section" id="experience">
    <h2>Gallery</h2>

    <div class="experience-gallery">
      <div class="experience-item">
        <img src="assets/experience/e5.png" alt="External experience 1">
        <p>Ciyaraah Winners🥇 2k26...🏀</p>
      </div>
      <div class="experience-item">
        <img src="assets/experience/e4.png" alt="External experience 1">
        <p>Ranarangam Runners🥈 2k26...🏀</p>
      </div>
      <div class="experience-item">
        <img src="assets/experience/e1.png" alt="Tech experience 1">
        <p>NRCM Hackathon 2k25...💻</p>
      </div>

      <div class="experience-item">
        <img src="assets/experience/e2.png" alt="External experience 1">
        <p>Ciyaraah Winners🥇 2k25...🏀</p>
      </div>

      <div class="experience-item">
        <img src="assets/experience/e3.png" alt="Tech experience 3">
        <p>Salesforce Webinar...🎤</p>
      </div>
      <div class="experience-item">
        <img src="assets/experience/e0.png" alt="External experience 4">
        <p>31st NVS National Winners🥇 2023–24...🏀</p>
      </div>

    </div>
  </section>

</body>
</html>
